<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>Disappearing Text</title>

<style>

body{
font-family:Arial, sans-serif;
background:#f5f7fb;
margin:0;
padding:30px;
}

.container{
max-width:1000px;
margin:auto;
}

h1{
text-align:center;
margin-bottom:20px;
}

textarea{
width:100%;
height:220px;
font-size:16px;
padding:15px;
border-radius:10px;
border:1px solid #ccc;
resize:vertical;
}

button{
margin-top:15px;
padding:12px 22px;
font-size:16px;
border:none;
border-radius:8px;
background:#4a6cf7;
color:white;
cursor:pointer;
}

button:hover{
background:#3b55d4;
}

.text-area{
margin-top:40px;
line-height:1.9;
font-size:20px;
}

.word{
cursor:pointer;
padding:2px 4px;
border-radius:4px;
transition:0.15s;
}

.word:hover{
background:#e7ebff;
}

.hidden{
color:transparent;
background:#dfe3ff;
}

.bold{
font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<h1>Disappearing Text</h1>

<div id="inputBlock">

<textarea id="textInput" placeholder="Paste your text or dialogue here..."></textarea>

<br>

<button onclick="generate()">Generate</button>

</div>

<div id="gameBlock" style="display:none">

<div class="text-area" id="textArea"></div>

</div>

</div>

<script>

function generate(){

let text=document.getElementById("textInput").value.trim()

if(!text)return

document.getElementById("inputBlock").style.display="none"
document.getElementById("gameBlock").style.display="block"

let words=text.split(/(\s+)/)

let html=""

words.forEach(word=>{

if(word.trim()===""){
html+=word
return
}

let clean=word.replace(":","")

let isSpeaker=word.endsWith(":")

let span=document.createElement("span")

span.textContent=word
span.classList.add("word")

if(isSpeaker){
span.classList.add("bold")
}

span.onclick=function(){
span.classList.toggle("hidden")
}

html+=span.outerHTML

})

document.getElementById("textArea").innerHTML=html

}

</script>

</body>
</html>
